<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📄 Markdown Viewer</h1>
      <p class="subtitle">Markdownファイルをアップロードして表示</p>
    </header>
    
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">📁</div>
      <p class="upload-text">ファイルを選択またはドラッグ&ドロップ</p>
      <input type="file" id="fileInput" accept=".md,.markdown" style="display: none;">
      <button class="btn-primary" id="selectBtn">ファイルを選択</button>
    </div>
    
    <div class="viewer-container" id="viewerContainer" style="display: none;">
      <div class="viewer-header">
        <span class="filename" id="filename"></span>
        <div class="viewer-header-actions">
          <label class="tab-display-option" for="hideHeaderInTab">
            <input type="checkbox" id="hideHeaderInTab">
            <span>ヘッダーを隠す</span>
          </label>
          <button class="btn-tab" id="openInTabBtn">タブで開く</button>
          <button class="btn-secondary" id="closeBtn">閉じる</button>
        </div>
      </div>
      <div class="viewer-content" id="viewerContent"></div>
    </div>
    
    <div class="error-message" id="errorMessage" style="display: none;"></div>
  </div>
  
  <script src="marked.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
